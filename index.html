<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<meta name="description" content="A beautiful birthday surprise website">

<meta name="theme-color" content="#000000">

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">

<title>Secret Birthday Surprise</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<audio id="bgMusic" loop>
<source src="music.mp3" type="audio/mpeg">
</audio>

<!-- Hacker Screen -->
<div id="s0" class="screen active">
<h2 id="hackText"></h2>
</div>

<!-- Name Input -->
<div id="s1" class="screen">
<h2>Enter Your Name</h2>

<input id="nameInput" placeholder="Type your name">

<br><br>

<button onclick="start()">Start Surprise 🎁</button>
</div>

<!-- Greeting -->
<div id="s2" class="screen">
<h1 id="hello"></h1>
<p>I have something special for you ❤️</p>

<button onclick="nextPage(3)">See Memories</button>
</div>

<!-- Photos -->
<div id="s3" class="screen">
<h1>Memories 📸</h1>

<div id="photos"></div>

<br><br>

<button onclick="nextPage(4)">Next</button>
</div>

<!-- Gift -->
<div id="s4" class="screen">
<h1>🎁 A Gift For You</h1>
<p>Click to open your surprise</p>

<button onclick="openGift()">Open Gift 🎁</button>
</div>

<!-- Final -->
<div id="s5" class="screen">
<h1 style="color:pink">🎉 HAPPY BIRTHDAY SWATHI🎉</h1>

<h2>You are my best friend forever ❤️</h2>

<div class="cake" onclick="blowCandles()">
🎂
<div class="flame" id="flame">🔥</div>
</div>

<p id="blowText">Tap the cake to blow candles 🎂</p>

<p>
Thank you for all the memories and happiness you bring into my life.
</p>
</div>

<script src="script.js"></script>

</body>
</html>
